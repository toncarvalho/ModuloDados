<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0d0d12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Idol Math ⚡ Tabuada Kpop Metal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game-root"></div>

  <!-- Phaser 3 (vendorizado localmente, funciona offline) -->
  <script src="vendor/phaser.min.js"></script>

  <!-- Core -->
  <script src="js/core/Storage.js"></script>
  <script src="js/core/MathEngine.js"></script>
  <script src="js/core/Audio.js"></script>
  <script src="js/core/UI.js"></script>
  <script src="js/core/Util.js"></script>

  <!-- Data -->
  <script src="js/data/fases.js"></script>
  <script src="js/data/herois.js"></script>

  <!-- Scenes -->
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/MenuScene.js"></script>
  <script src="js/scenes/HeroScene.js"></script>
  <script src="js/scenes/StageScene.js"></script>
  <script src="js/scenes/GameScene.js"></script>
  <script src="js/scenes/ResultScene.js"></script>
  <script src="js/scenes/SettingsScene.js"></script>
  <script src="js/scenes/TrainScene.js"></script>

  <!-- Bootstrap -->
  <script src="js/main.js"></script>

  <!-- Service Worker (PWA offline) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
