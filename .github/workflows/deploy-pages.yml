name: Deploy to GitHub Pages

# Roda os testes e publica o jogo (site estático) no GitHub Pages.
# Pré-requisito (uma vez): Settings -> Pages -> Source = GitHub Actions.
on:
  push:
    branches:
      - "master"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes; não cancela um deploy em andamento.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Testes
        run: npm test

  deploy:
    # Só publica em push/dispatch (PRs apenas testam).
    if: github.event_name != 'pull_request'
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Habilita o GitHub Pages (source = GitHub Actions) automaticamente,
          # evitando a necessidade de ligar manualmente em Settings -> Pages.
          enablement: true

      - name: Empacotar o site (raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
