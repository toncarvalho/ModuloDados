<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b2ff7"/>
      <stop offset="0.55" stop-color="#0d0d12"/>
      <stop offset="1" stop-color="#ff3ea5"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- estrelas -->
  <g fill="#ffd23e" opacity="0.85">
    <circle cx="90" cy="110" r="6"/>
    <circle cx="420" cy="90" r="5"/>
    <circle cx="140" cy="420" r="5"/>
    <circle cx="400" cy="410" r="6"/>
  </g>
  <!-- raio metal -->
  <path d="M300 70 L190 270 L260 270 L210 442 L350 220 L280 220 Z"
        fill="#2ff7e6" filter="url(#glow)" opacity="0.95"/>
  <!-- símbolo de multiplicação -->
  <g stroke="#ffffff" stroke-width="34" stroke-linecap="round" filter="url(#glow)">
    <line x1="150" y1="320" x2="230" y2="400"/>
    <line x1="230" y1="320" x2="150" y2="400"/>
  </g>
  <text x="256" y="200" font-family="Trebuchet MS, sans-serif" font-size="120"
        font-weight="bold" fill="#ffffff" text-anchor="middle"
        filter="url(#glow)">×</text>
</svg>
